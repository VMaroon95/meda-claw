name: MedaClaw Governance Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  governance-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install meda-claw (local)
        run: pip install .

      - name: Run Governance Audit
        run: medaclaw report --json . > audit_report.json

      - name: Display Score
        run: |
          SCORE=$(python3 -c "import json; print(json.load(open('audit_report.json'))['governance_score'])")
          echo "🦞 Governance Score: $SCORE/100"

      - name: Semantic Review (PR only)
        if: github.event_name == 'pull_request'
        run: medaclaw review --pr .

      - name: Upload Audit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: governance-report
          path: audit_report.json
